<!DOCTYPE html>
<html>
<head>
<title>Genius Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: linear-gradient(to bottom, #000, #222);
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

h1 { margin:10px; }

.panel {
  background:#111;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  padding:10px;
}

.card {
  aspect-ratio:1;
  background:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
  transform:scale(1);
}

.card:active {
  transform:scale(0.9);
}

.matched {
  background:green;
  transform:scale(1.05);
}

</style>

</head>

<body>

<h1>🧠 Genius Game</h1>

<div class="panel">
  <input id="nameInput" placeholder="Enter name">
  <button onclick="startGame()">Start</button>
</div>

<div class="panel">
  <p id="player"></p>
  <p>Level: <span id="level">1</span></p>
  <p>Score: <span id="score">0</span></p>
  <p>Time: <span id="timer">20</span></p>
</div>

<div class="grid" id="grid"></div>

<div class="panel" id="leaderboard"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// FIREBASE CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyD7Yt4xJWstWZqZQrK89G3JQZjIgk9dNV8",
  authDomain: "marne-genius-game.firebaseapp.com",
  databaseURL: "https://marne-genius-game-default-rtdb.firebaseio.com",
  projectId: "marne-genius-game",
  storageBucket: "marne-genius-game.firebasestorage.app",
  messagingSenderId: "431179715064",
  appId: "1:431179715064:web:f66a3db47ee02c9fb4c60d"
};

firebase.initializeApp(firebaseConfig);
let db = firebase.database();

let playerName = "";
let score = 0;
let level = 1;
let opened = [];
let matchCount = 0;
let timer = 20;
let interval;

function startGame(){
  playerName = document.getElementById("nameInput").value || "Player";
  document.getElementById("player").innerText = "Player: " + playerName;
  score = 0;
  level = 1;
  nextLevel();
}

function nextLevel(){
  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;
  createGrid();
  startTimer();
}

function createGrid(){

  let data = [
  ["Gravity?","Newton"],
  ["Mona Lisa?","Da Vinci"],
  ["AC Power?","Tesla"],
  ["Relativity?","Einstein"]
  ];

  let cards=[];
  data.forEach(d=>{
    cards.push({q:d[0], a:d[1]});
    cards.push({q:d[0], a:d[1]});
  });

  cards.sort(()=>0.5-Math.random());

  let grid=document.getElementById("grid");
  grid.innerHTML="";
  opened=[];
  matchCount=0;

  cards.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.dataset.answer=item.a;
    div.dataset.question=item.q;
    div.innerHTML="?";

    div.onclick=()=>flip(div);

    grid.appendChild(div);
  });
}

function startTimer(){
  clearInterval(interval);
  timer = 20 - level*2;
  if(timer < 5) timer = 5;

  document.getElementById("timer").innerText = timer;

  interval = setInterval(()=>{
    timer--;
    document.getElementById("timer").innerText = timer;

    if(timer===0){
      clearInterval(interval);
      alert("⏱ Time’s up!");
      saveScore();
      nextLevel();
    }
  },1000);
}

function flip(card){
  if(opened.length<2 && !card.classList.contains("matched")){
    card.innerHTML = card.dataset.question || card.dataset.answer;
    opened.push(card);

    if(opened.length==2){
      setTimeout(checkMatch,500);
    }
  }
}

function checkMatch(){

  if(opened[0].dataset.answer === opened[1].dataset.answer){

    opened.forEach(c=>c.classList.add("matched"));
    score += 10;
    matchCount++;

    document.getElementById("score").innerText = score;

    if(matchCount===4){
      clearInterval(interval);
      saveScore();
      level++;
      setTimeout(nextLevel,1000);
    }

  } else {
    opened.forEach(c=>{
      c.innerHTML="?";
    });
  }

  opened=[];
}

// SAVE SCORE ONLINE
function saveScore(){
  db.ref("players/"+playerName).set({
    name:playerName,
    score:score
  });
}

// LIVE LEADERBOARD
db.ref("players").on("value",snapshot=>{
  let data=snapshot.val();
  let html="<h3>🏆 Leaderboard</h3>";

  let arr=Object.values(data||{});
  arr.sort((a,b)=>b.score-a.score);

  arr.forEach(p=>{
    html += "<p>"+p.name+" - "+p.score+"</p>";
  });

  document.getElementById("leaderboard").innerHTML = html;
});

</script>

</body>
</html>
