<!DOCTYPE html>
<html>
<head>
<title>Genius Game</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:8px;
  justify-content:center;
}

.card {
  width:80px;
  height:80px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
  padding:5px;
}

.matched { background:green; }
</style>

</head>

<body>

<h1>🧠 Genius Game</h1>

<p>Enter name: <input id="nameInput"></p>
<button onclick="startGame()">Start Game</button>

<p id="player"></p>
<p>Score: <span id="score">0</span></p>

<div class="grid" id="grid"></div>

<h2 id="winMessage"></h2>

<script>

let playerName = "";
let score = 0;
let opened = [];
let matchCount = 0;

function startGame(){

  playerName = document.getElementById("nameInput").value;
  if(!playerName) playerName = "Player";

  document.getElementById("player").innerText = "Player: " + playerName;

  createGrid();
}

function createGrid(){

  let data = [
  ["Who discovered gravity?","Newton"],
  ["Who painted Mona Lisa?","Da Vinci"],
  ["Who created AC Power?","Tesla"],
  ["Who made Relativity?","Einstein"]
  ];

  let cards=[];
  data.forEach(d=>{
    cards.push({q:d[0], a:d[1]});
    cards.push({q:d[0], a:d[1]});
  });

  cards.sort(()=>0.5-Math.random());

  let grid=document.getElementById("grid");
  grid.innerHTML="";
  opened=[];
  matchCount = 0;
  score = 0;
  document.getElementById("score").innerText = score;
  document.getElementById("winMessage").innerText = "";

  cards.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.dataset.answer=item.a;
    div.dataset.question=item.q;
    div.innerHTML="?";

    div.onclick=()=>flip(div);

    grid.appendChild(div);
  });
}

function flip(card){
  if(opened.length<2 && !card.classList.contains("matched")){

    card.innerHTML = card.dataset.question || card.dataset.answer;

    opened.push(card);

    if(opened.length==2){
      setTimeout(checkMatch,500);
    }
  }
}

function checkMatch(){

  if(opened[0].dataset.answer === opened[1].dataset.answer){

    opened.forEach(c=>c.classList.add("matched"));
    score += 10;
    matchCount++;

    document.getElementById("score").innerText = score;

    if(matchCount === 4){
      document.getElementById("winMessage").innerText = "🏆 You Win Genius!";
    }

  } else {
    opened.forEach(c=>{
      c.innerHTML="?";
    });
  }

  opened=[];
}

</script>

</body>
</html>
