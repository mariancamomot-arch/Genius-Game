<!DOCTYPE html>
<html>
<head>
<title>Genius Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  background: linear-gradient(to bottom, #000, #222);
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

.panel {
  background:#111;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  padding:10px;
}

.card {
  aspect-ratio:1;
  background:#111;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
  transition:0.3s;
}

.card:active { transform:scale(0.9); }
.matched { background:green; }
</style>

</head>

<body>

<h1>🧠 Genius Game</h1>

<div class="panel">
<input id="nameInput" placeholder="Enter name">
<button onclick="joinGame()">Start</button>
</div>

<div class="panel">
<p id="player"></p>
<p>Level: <span id="level">1</span></p>
<p>Score: <span id="score">0</span></p>
<p>Coins: <span id="coins">0</span></p>
<p>Time: <span id="timer">20</span></p>
</div>

<div class="grid" id="grid"></div>

<div class="panel" id="leaderboard"></div>

<!-- SOUND -->
<audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
<audio id="matchSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// 🔥 PUT YOUR REAL FIREBASE CONFIG HERE
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "marne-genius-game.firebaseapp.com",
  databaseURL: "https://marne-genius-game-default-rtdb.firebaseio.com",
  projectId: "marne-genius-game"
};

firebase.initializeApp(firebaseConfig);
let db = firebase.database();

// VARIABLES
let playerName="";
let score=0;
let coins=0;
let level=1;
let opened=[];
let matchCount=0;
let timer=20;
let interval;
let roomId="room1";

let clickS=document.getElementById("clickSound");
let matchS=document.getElementById("matchSound");
let wrongS=document.getElementById("wrongSound");

// JOIN GAME
function joinGame(){
  playerName=document.getElementById("nameInput").value||"Player";
  document.getElementById("player").innerText="Player: "+playerName;

  db.ref("rooms/"+roomId+"/players/"+playerName).set({
    name:playerName,
    score:0
  });

  startGame();
}

// START GAME
function startGame(){
  score=0;
  coins=0;
  level=1;
  nextLevel();
}

// LEVEL DATA
function getData(level){

if(level<5){
return [
["Gravity?","Newton"],
["Mona Lisa?","Da Vinci"],
["AC Power?","Tesla"],
["Relativity?","Einstein"]
];
}

if(level<10){
return [
["Apple founder?","Jobs"],
["Facebook founder?","Zuckerberg"],
["Microsoft founder?","Gates"],
["Tesla CEO?","Musk"]
];
}

if(level<20){
return [
["2+2","4"],
["5x5","25"],
["10/2","5"],
["9+1","10"]
];
}

if(level<50){
return [
["Largest planet?","Jupiter"],
["Fastest animal?","Cheetah"],
["Red planet?","Mars"],
["Ocean largest?","Pacific"]
];
}

return [
["Brain","Mind"],
["Focus","Win"],
["Memory","Power"],
["Think","Smart"]
];

}

// NEXT LEVEL
function nextLevel(){
  document.getElementById("level").innerText=level;
  document.getElementById("score").innerText=score;
  document.getElementById("coins").innerText=coins;
  createGrid();
  startTimer();
}

// CREATE GRID
function createGrid(){

let data=getData(level);

let cards=[];
data.forEach(d=>{
  cards.push({q:d[0],a:d[1]});
  cards.push({q:d[0],a:d[1]});
});

cards.sort(()=>0.5-Math.random());

let grid=document.getElementById("grid");
grid.innerHTML="";
opened=[];
matchCount=0;

cards.forEach(item=>{
  let div=document.createElement("div");
  div.className="card";
  div.dataset.answer=item.a;
  div.dataset.question=item.q;
  div.innerHTML="?";

  div.onclick=()=>flip(div);

  grid.appendChild(div);
});
}

// TIMER
function startTimer(){
clearInterval(interval);
timer=20-level;
if(timer<5) timer=5;

document.getElementById("timer").innerText=timer;

interval=setInterval(()=>{
timer--;
document.getElementById("timer").innerText=timer;

if(timer==0){
clearInterval(interval);
alert("⏱ Time up!");
saveScore();
nextLevel();
}
},1000);
}

// FLIP
function flip(card){
if(opened.length<2 && !card.classList.contains("matched")){

clickS.play();

card.innerHTML=card.dataset.question;
opened.push(card);

if(opened.length==2){
setTimeout(checkMatch,400);
}
}
}

// CHECK MATCH
function checkMatch(){

if(opened[0].dataset.answer==opened[1].dataset.answer){

matchS.play();

opened.forEach(c=>c.classList.add("matched"));
score+=10;
coins+=5;
matchCount++;

document.getElementById("score").innerText=score;
document.getElementById("coins").innerText=coins;

if(matchCount==4){
clearInterval(interval);
level++;

if(level>100){
showWinner();
return;
}

setTimeout(nextLevel,800);
}

}else{

wrongS.play();

opened.forEach(c=>c.innerHTML="?");
}

opened=[];
}

// SAVE SCORE
function saveScore(){
db.ref("rooms/"+roomId+"/players/"+playerName).set({
name:playerName,
score:score
});
}

// LEADERBOARD
db.ref("rooms/"+roomId+"/players").on("value",snap=>{
let data=snap.val();
let html="<h3>🏆 Leaderboard</h3>";

let arr=Object.values(data||{});
arr.sort((a,b)=>b.score-a.score);

arr.forEach(p=>{
html+="<p>"+p.name+" - "+p.score+"</p>";
});

document.getElementById("leaderboard").innerHTML=html;
});

// WINNER
function showWinner(){
db.ref("rooms/"+roomId+"/players").once("value",snap=>{
let players=Object.values(snap.val()||{});
players.sort((a,b)=>b.score-a.score);
let winner=players[0];

alert("🏆 Winner: "+winner.name+" ("+winner.score+")");
});
}

</script>

</body>
</html>
