<!DOCTYPE html>
<html>
<head>
<title>Genius Multiplayer</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:8px;
  justify-content:center;
}

.card {
  width:80px;
  height:80px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.matched { background:green; }

#leaderboard { margin-top:20px; }
</style>

</head>

<body>

<h1>🌐 Genius Multiplayer</h1>

<p id="player"></p>
<p>Score: <span id="score">0</span></p>

<div class="grid" id="grid"></div>

<div id="leaderboard"></div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// ✅ FIREBASE CONFIG (ALREADY FIXED)
var firebaseConfig = {
  apiKey: "AIzaSyD7Yt4xJWstWZqZQrK89G3JQZjIgk9dNV8",
  authDomain: "marne-genius-game.firebaseapp.com",
  databaseURL: "https://marne-genius-game-default-rtdb.firebaseio.com",
  projectId: "marne-genius-game",
  storageBucket: "marne-genius-game.firebasestorage.app",
  messagingSenderId: "431179715064",
  appId: "1:431179715064:web:f66a3db47ee02c9fb4c60d"
};

firebase.initializeApp(firebaseConfig);
let db = firebase.database();

// PLAYER
let playerName = prompt("Enter your name:");
document.getElementById("player").innerText = "Player: " + playerName;

// SCORE
let score = 0;

// DATA (GENIUS CLUES)
let data = [
["Relativity","Einstein"],
["AC Power","Tesla"],
["Gravity","Newton"],
["Mona Lisa","Da Vinci"]
];

// CREATE CARDS
let cards=[];
data.forEach(d=>{
  cards.push(d);
  cards.push(d);
});
cards.sort(()=>0.5-Math.random());

// DISPLAY GRID
let grid=document.getElementById("grid");

cards.forEach(item=>{
  let div=document.createElement("div");
  div.className="card";
  div.dataset.name=item[1];
  div.innerHTML=item[0];
  div.onclick=()=>flip(div);
  grid.appendChild(div);
});

let opened=[];

// FLIP FUNCTION
function flip(card){
  if(opened.length<2 && !card.classList.contains("matched")){
    card.innerHTML=card.dataset.name;
    opened.push(card);

    if(opened.length==2){
      setTimeout(checkMatch,400);
    }
  }
}

// CHECK MATCH
function checkMatch(){
  if(opened[0].dataset.name===opened[1].dataset.name){
    opened.forEach(c=>c.classList.add("matched"));
    score+=10;
    updateScore();
  } else {
    opened.forEach(c=>{
      c.innerHTML=data.find(d=>d[1]===c.dataset.name)[0];
    });
  }

  opened=[];
}

// UPDATE SCORE TO FIREBASE
function updateScore(){
  document.getElementById("score").innerText=score;

  db.ref("players/"+playerName).set({
    name:playerName,
    score:score
  });
}

// LIVE LEADERBOARD
db.ref("players").on("value",snapshot=>{
  let data=snapshot.val();

  let html="<h2>🏆 Live Leaderboard</h2>";

  let arr=Object.values(data||{});
  arr.sort((a,b)=>b.score-a.score);

  arr.forEach(p=>{
    html+="<p>"+p.name+" - "+p.score+"</p>";
  });

  document.getElementById("leaderboard").innerHTML=html;
});

</script>

</body>
</html>
