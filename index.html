<!DOCTYPE html>
<html>
<head>
<title>Genius Game</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:8px;
  justify-content:center;
}

.card {
  width:80px;
  height:80px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.matched { background:green; }
</style>

</head>

<body>

<h1>🌐 Genius Game</h1>

<p>Enter name: <input id="nameInput"></p>
<button onclick="startGame()">Start Game</button>

<p id="player"></p>
<p>Score: <span id="score">0</span></p>

<div class="grid" id="grid"></div>

<script>

let playerName = "";
let score = 0;

function startGame(){

  playerName = document.getElementById("nameInput").value;
  if(!playerName) playerName = "Player";

  document.getElementById("player").innerText = "Player: " + playerName;

  startGrid();
}

function startGrid(){

  let data = [
  ["Relativity","Einstein"],
  ["AC Power","Tesla"],
  ["Gravity","Newton"],
  ["Mona Lisa","Da Vinci"]
  ];

  let cards=[];
  data.forEach(d=>{
    cards.push(d);
    cards.push(d);
  });

  cards.sort(()=>0.5-Math.random());

  let grid=document.getElementById("grid");
  grid.innerHTML="";

  cards.forEach(item=>{
    let div=document.createElement("div");
    div.className="card";
    div.dataset.name=item[1];
    div.innerHTML=item[0];
    div.onclick=()=>flip(div);
    grid.appendChild(div);
  });
}

let opened=[];

function flip(card){
  if(opened.length<2 && !card.classList.contains("matched")){
    card.innerHTML=card.dataset.name;
    opened.push(card);

    if(opened.length==2){
      setTimeout(checkMatch,400);
    }
  }
}

function checkMatch(){
  if(opened[0].dataset.name===opened[1].dataset.name){
    opened.forEach(c=>c.classList.add("matched"));
    score+=10;
    document.getElementById("score").innerText=score;
  } else {
    opened.forEach(c=>{
      c.innerHTML=c.innerText;
    });
  }
  opened=[];
}

</script>

</body>
</html>
